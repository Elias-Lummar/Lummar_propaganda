<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela 2</title>
    <link rel="stylesheet" href="css/presenter-1.css">
</head>
<body>
    <div id="presenter-container">
        <div id="media-container">
            <div id="no-ads-message" class="no-ads">
                <div class="no-ads-content">
                    <i class="fas fa-tv"></i>
                    <h2>Nenhuma propaganda ativa</h2>
                    <p>Aguardando propagandas programadas...</p>
                </div>
            </div>
        </div>
        
        <!-- Loading indicator -->
        <div id="loading-indicator" class="loading">
            <div class="loading-spinner"></div>
            <p>Carregando propagandas...</p>
        </div>
        
        <!-- Controls (hidden by default) -->
      <div id="controls" class="controls">
            <button id="fullscreen-btn" title="Tela Cheia" onclick="toggleFullScreen()">
                <i class="fas fa-expand">Full</i>
            </button>
            <button id="hide-btn" title="Ocultar Barra" onclick="hideBar()">
                <i class="fas fa-expand">Hide</i>
            </button>
            <button id="play-pause-btn" title="Play/Pause" onclick="togglePlayPause()">
                <i class="fas fa-pause">Play</i>
            </button>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
        </div>
    </div>

    <!-- Ícones removidos para compatibilidade -->
    <script src="js/presenter-compat-1.js"></script>
</body>
</html>
