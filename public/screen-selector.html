<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lummar – Configurar Apresentador</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f0f13;
        color: #e2e2e2;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        user-select: none;
        -webkit-app-region: drag;
        overflow: hidden;
      }

      /* ── Logo ── */
      .logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .logo svg {
        width: 42px;
        height: 42px;
      }
      .logo h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
      }

      /* ── Step indicator ── */
      .steps {
        display: flex;
        align-items: center;
        gap: 8px;
        -webkit-app-region: no-drag;
      }
      .step-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #1e1e2a;
        border: 2px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #555;
        transition:
          background 0.3s,
          border-color 0.3s,
          color 0.3s;
      }
      .step-dot.active {
        background: #5a6ef5;
        border-color: #5a6ef5;
        color: #fff;
      }
      .step-dot.done {
        background: #2e7d52;
        border-color: #2e7d52;
        color: #fff;
      }
      .step-line {
        width: 40px;
        height: 2px;
        background: #222;
        border-radius: 2px;
      }
      .step-label {
        font-size: 13px;
        color: #888;
      }

      /* ── Cards container ── */
      .cards {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
        -webkit-app-region: no-drag;
        max-width: 700px;
      }

      .card {
        background: #1a1a22;
        border: 2px solid #2a2a38;
        border-radius: 14px;
        padding: 20px 22px;
        min-width: 120px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
        position: relative;
      }
      .card:hover {
        border-color: #5a6ef5;
        background: #20203a;
        transform: translateY(-3px);
      }
      .card:active {
        transform: scale(0.97);
      }

      .card .badge {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        background: #5a6ef5;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.6px;
        padding: 2px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .card-icon {
        font-size: 30px;
        margin-bottom: 10px;
        line-height: 1;
      }
      .card h2 {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 4px;
      }
      .card .sub {
        font-size: 11px;
        color: #777;
      }

      /* ── Back button ── */
      .btn-back {
        background: none;
        border: 1px solid #333;
        color: #888;
        border-radius: 8px;
        padding: 6px 18px;
        font-size: 12px;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-back:hover {
        border-color: #5a6ef5;
        color: #aaa;
      }

      /* ── Footer ── */
      .footer {
        font-size: 12px;
        color: #444;
        -webkit-app-region: no-drag;
      }
      .footer kbd {
        background: #222;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 1px 6px;
        font-family: inherit;
        color: #888;
      }

      /* ── Transitions between steps ── */
      .view {
        transition: opacity 0.25s;
      }
      .view.hidden {
        opacity: 0;
        pointer-events: none;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect
          x="4"
          y="6"
          width="40"
          height="28"
          rx="3"
          stroke="#5a6ef5"
          stroke-width="3"
          fill="none"
        />
        <path
          d="M16 42h16M24 34v8"
          stroke="#5a6ef5"
          stroke-width="3"
          stroke-linecap="round"
        />
      </svg>
      <h1>LUMMAR PROPAGANDA</h1>
    </div>

    <!-- Indicador de etapas -->
    <div class="steps">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot2">2</div>
      <span class="step-label" id="step-label"
        >Escolha o painel de apresentação</span
      >
    </div>

    <!-- ETAPA 1 – escolha do painel -->
    <div class="cards view" id="step-presenter">
      <!-- preenchido por JS -->
    </div>

    <!-- ETAPA 2 – escolha da tela física -->
    <div class="cards view hidden" id="step-display">
      <!-- preenchido por JS -->
    </div>

    <!-- Botão voltar (só aparece na etapa 2) -->
    <button
      class="btn-back"
      id="btn-back"
      style="display: none"
      onclick="goBack()"
    >
      ← Voltar
    </button>

    <div class="footer">Pressione <kbd>Esc</kbd> para sair</div>

    <script>
      const PRESENTERS = [
        {
          file: "presenter.html",
          label: "Padrão",
          icon: "📺",
          desc: "Layout principal",
        },
        {
          file: "presenter1.html",
          label: "Painel 1",
          icon: "🖥️",
          desc: "Tela 1",
        },
        {
          file: "presenter2.html",
          label: "Painel 2",
          icon: "🖥️",
          desc: "Tela 2",
        },
        {
          file: "presenter3.html",
          label: "Painel 3",
          icon: "🖥️",
          desc: "Tela 3",
        },
        {
          file: "presenter4.html",
          label: "Painel 4",
          icon: "🖥️",
          desc: "Tela 4",
        },
      ];

      // Detecta se está no Electron ou no Browser
      const isElectronEnv = typeof window.electronAPI !== "undefined";

      let chosenPresenter = null;

      const stepPresenter = document.getElementById("step-presenter");
      const stepDisplay = document.getElementById("step-display");
      const btnBack = document.getElementById("btn-back");
      const dot1 = document.getElementById("dot1");
      const dot2 = document.getElementById("dot2");
      const stepLabel = document.getElementById("step-label");

      // ── Etapa 1: renderiza painéis ──────────────────────────────────────────
      PRESENTERS.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";

        if (p.file === "presenter.html") {
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.textContent = "Padrão";
          card.appendChild(badge);
        }

        card.innerHTML += `
        <div class="card-icon">${p.icon}</div>
        <h2>${p.label}</h2>
        <div class="sub">${p.desc}</div>
      `;

        card.addEventListener("click", () => selectPresenter(p.file));
        stepPresenter.appendChild(card);
      });

      // ── Etapa 2: carrega e renderiza displays ───────────────────────────────
      async function loadDisplays() {
        stepDisplay.innerHTML = "";

        if (isElectronEnv) {
          // No Electron: mostra monitores reais
          const displays = await window.electronAPI.getDisplays();

          displays.forEach((display, index) => {
            const card = document.createElement("div");
            card.className = "card";

            if (display.isPrimary) {
              const badge = document.createElement("div");
              badge.className = "badge";
              badge.textContent = "Principal";
              card.appendChild(badge);
            }

            card.innerHTML += `
            <div class="card-icon">🖥️</div>
            <h2>Monitor ${index + 1}</h2>
            <div class="sub">${display.width} × ${display.height}</div>
            <div class="sub" style="color:#444;margin-top:3px">Pos: ${display.x}, ${display.y}</div>
          `;

            card.addEventListener("click", () => {
              window.electronAPI.selectDisplay(display.id, chosenPresenter);
            });

            stepDisplay.appendChild(card);
          });
        } else {
          // No Browser: mostra opções de como abrir
          const options = [
            {
              icon: "🖥️",
              label: "Tela Cheia",
              desc: "Abrir nesta janela",
              action: () => {
                window.location.href = "/" + chosenPresenter + "?autostart=1";
              },
            },
            {
              icon: "🪟",
              label: "Nova Aba",
              desc: "Abrir em outra aba",
              action: () => {
                window.open("/" + chosenPresenter, "_blank");
              },
            },
          ];

          options.forEach((opt) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <div class="card-icon">${opt.icon}</div>
              <h2>${opt.label}</h2>
              <div class="sub">${opt.desc}</div>
            `;
            card.addEventListener("click", opt.action);
            stepDisplay.appendChild(card);
          });
        }
      }

      // ── Transições ──────────────────────────────────────────────────────────
      function selectPresenter(file) {
        chosenPresenter = file;

        stepPresenter.classList.add("hidden");
        stepDisplay.classList.remove("hidden");
        btnBack.style.display = "block";

        dot1.classList.remove("active");
        dot1.classList.add("done");
        dot2.classList.add("active");
        stepLabel.textContent = isElectronEnv
          ? "Escolha o monitor de exibição"
          : "Escolha como abrir o apresentador";

        loadDisplays();
      }

      function goBack() {
        stepDisplay.classList.add("hidden");
        stepPresenter.classList.remove("hidden");
        btnBack.style.display = "none";

        dot1.classList.remove("done");
        dot1.classList.add("active");
        dot2.classList.remove("active");
        stepLabel.textContent = "Escolha o painel de apresentação";
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (!stepDisplay.classList.contains("hidden")) {
            goBack();
            return;
          }
          if (isElectronEnv) {
            window.electronAPI.closeSelector();
          } else {
            // No browser: volta para a página anterior
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.href = "/admin";
            }
          }
        }
      });
    </script>
  </body>
</html>
