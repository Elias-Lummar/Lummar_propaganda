<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo - Sistema de Propagandas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="#"
          ><i class="fas fa-bullhorn me-2"></i>Sistema de Propagandas - Lummar
          Plásticos</a
        >
        <div class="navbar-nav ms-auto d-flex flex-row gap-2">
          <a
            class="nav-link"
            href="/presenter.html"
            target="_blank"
            title="Abrir Padrão"
          >
            <i class="fas fa-tv me-1"></i>P
          </a>
          <a
            class="nav-link"
            href="/presenter1.html"
            target="_blank"
            title="Abrir Painel 1"
          >
            <i class="fas fa-tv me-1"></i>P1
          </a>
          <a
            class="nav-link"
            href="/presenter2.html"
            target="_blank"
            title="Abrir Painel 2"
          >
            <i class="fas fa-tv me-1"></i>P2
          </a>
          <a
            class="nav-link"
            href="/presenter3.html"
            target="_blank"
            title="Abrir Painel 3"
          >
            <i class="fas fa-tv me-1"></i>P3
          </a>
          <a
            class="nav-link"
            href="/presenter4.html"
            target="_blank"
            title="Abrir Painel 4"
          >
            <i class="fas fa-tv me-1"></i>P4
          </a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- Alert Messages -->
      <div id="alertContainer"></div>

      <!-- Add/Edit Ad Form -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">
            <i class="fas fa-plus-circle me-2"></i>Cadastrar Nova Propaganda
          </h5>
        </div>
        <div class="card-body">
          <form id="adForm" enctype="multipart/form-data">
            <input type="hidden" id="editId" value="" />

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="title" class="form-label">Título</label>
                <input
                  type="text"
                  class="form-control"
                  id="title"
                  required
                  style="color: black !important"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label for="file" class="form-label"
                  >Arquivo (Imagem/Vídeo)</label
                >
                <input
                  type="file"
                  class="form-control"
                  id="file"
                  accept="image/*,video/*"
                  style="color: black !important"
                />
                <div class="form-text">
                  Formatos aceitos: JPG, PNG, GIF, MP4, AVI, MOV
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label style="margin-bottom: 0px" for="panel" class="form-label"
                  >Painel de Apresentação</label
                >
                <div
                  style="margin-top: 0px; margin-bottom: 10px"
                  class="form-text"
                >
                  Selecione em qual tela/painel a propaganda será exibida.
                </div>
                <div class="panel" id="panel">
                  <div>
                    <input
                      type="checkbox"
                      id="presenter"
                      name="presenter"
                      value="presenter"
                    />
                    <label for="presenter">Principal</label>
                  </div>
                  <div>
                    <input
                      type="checkbox"
                      id="presenter1"
                      name="presenter1"
                      value="presenter1"
                      checked
                    />
                    <label for="presenter1">Painel 1</label>
                  </div>
                  <div>
                    <input
                      type="checkbox"
                      id="presenter2"
                      name="presenter2"
                      value="presenter2"
                    />
                    <label for="presenter2">Painel 2</label>
                  </div>
                  <div>
                    <input
                      type="checkbox"
                      id="presenter3"
                      name="presenter3"
                      value="presenter3"
                    />
                    <label for="presenter3">Painel 3</label>
                  </div>
                  <div>
                    <input
                      type="checkbox"
                      id="presenter4"
                      name="presenter4"
                      value="presenter4"
                    />
                    <label for="presenter4">Painel 4</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="startTime" class="form-label"
                  >Data/Hora de Início</label
                >
                <input
                  type="datetime-local"
                  class="form-control"
                  id="startTime"
                  required
                  style="color: black !important"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label for="endTime" class="form-label">Data/Hora de Fim</label>
                <input
                  type="datetime-local"
                  class="form-control"
                  id="endTime"
                  required
                  style="color: black !important"
                />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="transitionType" class="form-label"
                  >Tipo de Transição</label
                >
                <select
                  class="form-select"
                  id="transitionType"
                  required
                  style="color: black !important"
                >
                  <option value="fade" style="color: black !important">
                    Fade (Opacidade)
                  </option>
                  <option value="slide" style="color: black !important">
                    Slide (Lateral)
                  </option>
                  <option value="smoke" style="color: black !important">
                    Smoke (Suave)
                  </option>
                  <option value="blink" style="color: black !important">
                    Blink (Direto)
                  </option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="transitionDuration" class="form-label"
                  >Duração da Transição (segundos)</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="transitionDuration"
                  min="1"
                  value="3"
                  required
                  style="color: black !important"
                />
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-1"></i
                ><span id="submitText">Salvar Propaganda</span>
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                id="cancelEdit"
                style="display: none"
              >
                <i class="fas fa-times me-1"></i>Cancelar Edição
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Ads List -->
      <div class="card">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0">
            <i class="fas fa-list me-2"></i>Propagandas Cadastradas
          </h5>
          <div class="d-flex gap-2">
            <button
              class="btn btn-success btn-sm"
              id="saveOrderBtn"
              onclick="saveOrder()"
              style="display: none"
            >
              <i class="fas fa-save me-1"></i>Salvar Ordem
            </button>
            <button
              class="btn btn-outline-primary btn-sm"
              id="refreshBtn"
              onclick="loadAds()"
            >
              <i class="fas fa-sync-alt me-1"></i>Atualizar
              <span
                id="autoRefreshCountdown"
                class="badge bg-primary ms-1"
                title="Próxima atualização automática"
                style="display: none"
                >--</span
              >
            </button>
          </div>
        </div>

        <!-- Panel Tabs -->
        <div class="panel-tabs-container">
          <div id="panelTabs" class="panel-tabs"></div>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th style="width: 28px"></th>
                  <th style="width: 50px">#</th>
                  <th>ID</th>
                  <th>Título</th>
                  <th>Arquivo</th>
                  <th>Período</th>
                  <th>Transição</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="adsTableBody">
                <tr>
                  <td colspan="9" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                      <span class="visually-hidden">Carregando...</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Paginação -->
          <div
            class="d-flex justify-content-between align-items-center mt-3 px-3 pb-3"
          >
            <div>
              <select
                id="itemsPerPage"
                class="form-select form-select-sm"
                style="width: auto; display: inline-block"
                onchange="changeItemsPerPage()"
              >
                <option value="100">100 itens</option>
                <option value="50" selected>50 itens</option>
                <option value="25">25 itens</option>
                <option value="10">10 itens</option>
                <option value="5">5 itens</option>
              </select>
            </div>
            <div>
              <span id="pageInfo" class="text-muted"></span>
            </div>
            <div>
              <ul
                class="pagination pagination-sm mb-0"
                id="paginationControls"
              ></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
