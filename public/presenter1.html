<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tela 1 - Lummar Propaganda</title>

    <!-- Desabilita economia de energia em smart TVs -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <link rel="stylesheet" href="css/presenter.css" />
  </head>
  <body>
    <!-- Overlay para iniciar visualização -->
    <div id="electron-init-overlay">
      <div class="overlay-content">
        <div class="overlay-logo">
          <svg
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            fill="#5a6ef5"
          >
            <path
              d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9.5 13l2.5 3.01L15.5 11l4.5 6H4l5.5-8z"
            />
          </svg>
          <h2 class="overlay-title">Lummar Propaganda</h2>
          <p class="overlay-subtitle">Escolha como iniciar a apresentação</p>
        </div>
        <div class="overlay-buttons">
          <button
            id="electron-init-btn"
            class="overlay-btn overlay-btn--fullscreen"
            type="button"
          >
            <div class="btn-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"
                />
              </svg>
            </div>
            <span class="btn-title">Tela Cheia</span>
            <span class="btn-subtitle">Abrir no navegador</span>
          </button>
          <button
            id="presenter-select-btn"
            class="overlay-btn overlay-btn--select"
            type="button"
          >
            <div class="btn-icon">
              <svg
                viewBox="0 0 48 48"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <rect
                  x="4"
                  y="6"
                  width="40"
                  height="28"
                  rx="3"
                  stroke="currentColor"
                  stroke-width="3"
                  fill="none"
                />
                <path
                  d="M16 42h16M24 34v8"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="btn-title">Selecionar Apresentador</span>
            <span class="btn-subtitle">Escolher qual tela exibir aqui</span>
          </button>
        </div>

        <!-- Seletor de Apresentador (oculto inicialmente) -->
        <div
          id="presenter-picker"
          class="presenter-picker"
          style="display: none"
        >
          <h3 class="picker-title">Escolha o Apresentador</h3>
          <div class="picker-cards" id="picker-cards"></div>
          <button class="picker-back" id="picker-back-btn" type="button">
            ← Voltar
          </button>
        </div>

        <p id="overlay-status" class="overlay-status"></p>
      </div>
    </div>

    <div id="presenter-container">
      <div id="media-container">
        <div id="no-ads-message" class="no-ads">
          <div class="no-ads-content">
            <h2>Nenhuma propaganda ativa</h2>
            <p>Aguardando propagandas programadas...</p>
          </div>
        </div>
      </div>

      <!-- Loading indicator -->
      <div id="loading-indicator" class="loading">
        <div class="loading-spinner"></div>
        <p>Carregando propagandas...</p>
      </div>

      <!-- Debug info (Alt+D para mostrar) -->
      <div
        id="debug-info"
        style="
          display: none;
          position: fixed;
          top: 10px;
          right: 10px;
          background: rgba(0, 0, 0, 0.85);
          color: #0f0;
          padding: 12px 16px;
          border-radius: 8px;
          font-family: monospace;
          font-size: 12px;
          z-index: 9999;
          min-width: 260px;
        "
      >
        <div style="margin-bottom: 4px">
          Painel: <span id="panel-name">-</span>
        </div>
        <div style="margin-bottom: 4px">
          Fila: <span id="queue-size">0</span> | Pos:
          <span id="current-index">-</span>
        </div>
        <div style="margin-bottom: 4px">
          Status: <span id="playback-status">-</span>
        </div>
        <div style="margin-bottom: 4px">
          Mídia: <span id="media-type">-</span>
        </div>
        <div style="margin-bottom: 4px">
          Sleep: <span id="sleep-method">-</span>
        </div>
        <div>TV: <span id="tv-platform">-</span></div>
      </div>
    </div>

    <!-- Vendor -->
    <script src="js/vendor/NoSleep.min.js"></script>

    <!-- Módulos do sistema -->
    <script src="js/modules/tv-compat.js"></script>
    <script src="js/modules/sleep-prevention.js"></script>
    <script src="js/modules/ads-queue.js"></script>
    <script src="js/modules/media-factory.js"></script>

    <!-- Controlador principal -->
    <script src="js/modules/ads-presenter.js"></script>
  </body>
</html>
